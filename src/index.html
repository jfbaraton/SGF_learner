<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGF Joseki Explorer</title>
</head>
<body>
  <div id="app">
    <header>
      <h1>Jeff's SGF Explorer</h1>
    </header>

    <div id="main-layout">
      <div id="board-panel">
        <div id="board-container">
          <canvas id="goban"></canvas>
        </div>

        <div id="controls">
          <button id="btn-start" title="Go to start (Home)">⏮</button>
          <button id="btn-back-10" title="Back 10 moves">⏪</button>
          <button id="btn-prev" title="Previous move (←)">◀</button>
          <button id="btn-next" title="Next move (→)">▶</button>
          <button id="btn-fwd-10" title="Forward 10 moves">⏩</button>
          <button id="btn-end" title="Go to end (End)">⏭</button>
          <span class="control-separator"></span>
          <button id="btn-pass" title="Select pass variation (P)">Pass</button>
        </div>

        <div id="branch-controls">
          <label for="branch-select">Variations:</label>
          <select id="branch-select"></select>
          <span id="move-counter"></span>
        </div>
      </div>

      <div id="info-panel">
        <details id="settings-box" class="panel-box">
          <summary><h3>⚙ Settings</h3></summary>
          <div class="settings-content">
            <div class="setting-row">
              <label for="setting-coords">Show coordinates</label>
              <input type="checkbox" id="setting-coords" checked />
            </div>
            <div class="setting-row">
              <label for="setting-labels">Show labels</label>
              <input type="checkbox" id="setting-labels" checked />
            </div>
            <div class="setting-row">
              <label for="setting-marks">Show marks</label>
              <input type="checkbox" id="setting-marks" checked />
            </div>
            <div class="setting-row">
              <label for="setting-lastmove">Show last move indicator</label>
              <input type="checkbox" id="setting-lastmove" checked />
            </div>
            <div class="setting-row">
              <label for="setting-boardsize">Board scale</label>
              <input type="range" id="setting-boardsize" min="20" max="50" value="30" />
            </div>
            <div class="setting-row">
              <label for="setting-vary-orientation">Vary board orientation</label>
              <input type="checkbox" id="setting-vary-orientation" />
            </div>
          </div>
        </details>

        <div id="comment-box" class="panel-box">
          <h3>Comments</h3>
          <div id="comment-text"></div>
        </div>
        <div id="path-box">
          <h3>Current Path</h3>
          <div id="path-display"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
